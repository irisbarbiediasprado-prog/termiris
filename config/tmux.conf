# Habilita suporte a cores de 24-bit (True Color) no terminal
set -g default-terminal "screen-256color"
set-option -s terminal-overrides ",xterm-256color:Tc"

# Atualização frequente da barra
set -g status-interval 2
set -g status-position bottom

# Fundo escuro para destacar o arco-íris
set -g status-style bg=#1e1e2e,fg=#ffffff

# --- LADO ESQUERDO: Nome da Sessão (Violeta e Laranja) ---
set -g status-left "#[bg=#89b4fa,fg=#11111b,bold] 🌈 #S #[bg=#fab387,fg=#89b4fa,nobold]"
set -g status-left-length 30

# --- LADO DIREITO: Gradiente Arco-Íris ---
set -g status-right "#[fg=#f9e2af,bg=#1e1e2e]#[bg=#f9e2af,fg=#11111b,bold] %H:%M #[fg=#a6e3a1,bg=#f9e2af]#[bg=#a6e3a1,fg=#11111b,bold] %d/%m #[fg=#89dceb,bg=#a6e3a1]#[bg=#89dceb,fg=#11111b,bold] Android #[fg=#f5c2e7,bg=#89dceb]#[bg=#f5c2e7,fg=#11111b,bold] #H "
set -g status-right-length 100

# --- JANELAS ---
set-window-option -g window-status-style bg=#313244,fg=#cdd6f4
set-window-option -g window-status-format "#[fg=#1e1e2e,bg=#45475a]#[fg=#cdd6f4] #I:#W #[fg=#45475a,bg=#1e1e2e]"
set-window-option -g window-status-current-format "#[fg=#1e1e2e,bg=#f5e0dc]#[fg=#11111b,bold] #I:#W* #[fg=#f5e0dc,bg=#1e1e2e]"

# --- PANES ---
set -g pane-border-style fg=#313244
set -g pane-active-border-style fg=#f5c2e7

set -ga terminal-overrides ",*:Tc"
set -g history-limit 100000
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
bind r source-file ~/.termiris/config/tmux.conf \; display-message "tmux.conf recarregado"
set -sg escape-time 0

bind -n M-c new-window
bind -n M-n next-window
bind -n M-x kill-window
bind -n M-v run-shell "~/.termiris/bin/colar"
bind -n M-y run-shell "~/.termiris/bin/copiar"
bind -n M-b new-window -n ff "~/.termiris/bin/ff"
bind -n F1 run-shell "~/.termiris/bin/ai"
